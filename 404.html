<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada | Punto de Encuentro</title>

    <link rel="icon" type="image/png" href="/icon_max.png" />
    <link rel="apple-touch-icon" href="/icon_max.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Mona+Sans:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #053b4b;
        --teal: #1097ac;
        --light: #f7f9f9;
        --accent: #cf3d3a;
        --font-main: 'Mona Sans', system-ui, -apple-system, sans-serif;
        --font-hand: 'Caveat', cursive;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--light);
        background-image: radial-gradient(circle at center, #ffffff 0%, var(--light) 100%);
        font-family: var(--font-main);
        color: var(--navy);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }

      .container {
        width: 100%;
        max-width: 450px;
        padding: 40px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo-img {
        width: 120px;
        height: auto;
        margin-bottom: 10px;
      }

      .logo-text {
        font-family: var(--font-hand);
        font-size: 2.5rem;
        color: var(--navy);
        margin: 0;
        line-height: 1;
      }

      .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: var(--teal);
        margin: 20px 0 0;
        line-height: 0.8;
        position: relative;
        z-index: 1;
      }

      .error-code::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-2deg);
        width: 120%;
        height: 60%;
        background: rgba(16, 151, 172, 0.1);
        z-index: -1;
        border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
      }

      .main-title {
        font-size: 2.5rem;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1;
        margin: 10px 0 20px;
        color: var(--navy);
        letter-spacing: -1px;
      }

      p {
        font-size: 1.1rem;
        font-weight: 400;
        margin-bottom: 40px;
        color: var(--navy);
        opacity: 0.9;
        max-width: 300px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        text-decoration: none;
        padding: 12px 20px;
        font-weight: 700;
        font-size: 1.2rem;
        color: var(--navy);
        background-color: transparent;
        border: 2px solid var(--navy);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        border-radius: 255px 25px 225px 25px/25px 225px 25px 255px;
        cursor: pointer;
        width: fit-content;
        transform: rotate(-1deg);
      }

      .link-btn:hover {
        transform: translateY(-3px) scale(1.02) rotate(1deg);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        background-color: rgba(5, 59, 75, 0.05);
      }

      .link-icon-container {
        width: 50px;
        height: 50px;
        margin-right: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .link-text {
        text-align: left;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .heart-icon {
        color: var(--teal);
        font-size: 1.5rem;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="logo_transparent.png" alt="Punto de Encuentro Logo" class="logo-img" />
      <h1 class="logo-text">Punto de Encuentro</h1>
      
      <div class="error-code">404</div>
      <h2 class="main-title">PÁGINA NO<br />ENCONTRADA</h2>
      
      <p>Lo sentimos, el camino que buscas no parece estar aquí.</p>
      
      <a href="/" class="link-btn">
        <div class="link-icon-container">
          <img src="logo_transparent.png" alt="Home" style="width: 100%; height: 100%; object-fit: contain; transform: scale(1.3)" />
        </div>
        <div class="link-text">Ir a<br />Página Web</div>
      </a>

      <div class="heart-icon">♡</div>
    </div>
  </body>
</html>
