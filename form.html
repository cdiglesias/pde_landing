<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Formulario de contacto - PDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Mona+Sans:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/icon_max.png" />
    <link rel="apple-touch-icon" href="/icon_max.png" />
    <style>
      body {
        margin: 0;
        font-family: 'Mona Sans', system-ui, sans-serif;
        background: #f7f9f9;
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 20px 10px;
        text-align: center;
      }

      .logo {
        width: 100px;
        height: auto;
        display: block;
      }

      .brand-title {
        color: #053b4b;
        font-family: 'Caveat', cursive;
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0;
        line-height: 1;
        text-decoration: none;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 12px 24px;
      }

      iframe {
        width: 100%;
        min-height: 1200px;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a href="/">
        <img src="logo_transparent.png" alt="Punto de Encuentro Logo" class="logo" />
      </a>
      <a href="/" class="brand-title">Punto de Encuentro</a>
    </header>

    <main class="container">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSdiisC5NBIbS38gLJXMfrauU7WfGw2j8vLDGYVlWmEJ25Mz3A/viewform?embedded=true"
        loading="lazy"
      >
      </iframe>
    </main>
  </body>
</html>
